<!DOCTYPE html>
<html lang="en">
<head> <meta charset="UTF-8"/> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>Lost & Found - College Buddy</title> <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="topbar"> <button id="menu-toggle">☰</button> <h2>Lost & Found</h2>
</div> <div class="app-layout"> <div id="sidebar-container"></div> <main class="main-content"> <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px"> <div> <h1> Lost & Found</h1> <p>Found something? Post it here. Posts auto-delete 24h after marking resolved.</p> </div> <button class="btn btn-primary" id="post-btn">+ Post Item</button> </div> <div id="alert-box"></div> <div class="grid-3" id="lf-grid"> <div class="empty-state" style="grid-column:1/-1"> <div class="empty-mark"></div> <p>Loading posts...</p> </div> </div> </main>
</div> <!-- Post Modal -->
<div class="modal-overlay" id="post-modal"> <div class="modal"> <button class="modal-close" id="close-post">✕</button> <h3> Post Found Item</h3> <p style="font-size:0.82rem;color:#64748b;margin-bottom:16px">Fill in the details so the owner can contact you.</p> <div id="post-alert"></div> <form id="post-form" enctype="multipart/form-data"> <div class="form-group"> <label>Description *</label> <textarea id="lf-desc" rows="3" placeholder="What did you find? e.g. Blue water bottle with sticker..." required></textarea> </div> <div class="form-row"> <div class="form-group"> <label>Found At *</label> <input type="text" id="lf-found" placeholder="e.g. Library 2nd floor" required/> </div> <div class="form-group"> <label>Collect From *</label> <input type="text" id="lf-collect" placeholder="e.g. CSE Dept office" required/> </div> </div> <div class="form-group"> <label>Your Contact *</label> <input type="text" id="lf-phone" placeholder="Phone or room number" required/> </div> <div class="form-group"> <label>Photo (optional)</label> <input type="file" id="lf-photo" accept=".jpg,.jpeg,.png,.webp"/> </div> <button type="submit" class="btn btn-primary btn-full" id="post-submit">Post Item</button> </form> </div>
</div> <!-- Detail Modal -->
<div class="modal-overlay" id="detail-modal"> <div class="modal" style="max-width:580px"> <button class="modal-close" id="close-detail">✕</button> <div id="detail-content"></div> </div>
</div> <script src="/js/app.js"></script>
<script src="/js/sidebar.js"></script>
<script> if (!requireAuth()) throw new Error(); renderSidebar(); const user = getUser(); let posts = []; async function loadPosts() { try { posts = await apiFetch('/lostfound'); renderPosts(); } catch(e) { document.getElementById('lf-grid').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-mark"></div><p>${e.message}</p></div>`; } } function renderPosts() { if (!posts.length) { document.getElementById('lf-grid').innerHTML = `<div class="empty-state" style="grid-column:1/-1"><div class="empty-mark"></div><p>Nothing lost! Everything accounted for.</p></div>`; return; } document.getElementById('lf-grid').innerHTML = posts.map(p => ` <div class="lf-card" onclick="openDetail('${p._id}')"> ${p.photo ? `<img src="${p.photo}" alt="Found item" onerror="this.style.display='none'"/>` : `<div style="height:100px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:2.5rem"></div>` } <div class="lf-card-body"> <h4>${p.description.length > 60 ? p.description.slice(0,57)+'...' : p.description}</h4> <div class="lf-info"> <span> Found at: ${p.foundAt}</span> <span> Collect from: ${p.collectFrom}</span> <span> ${p.phone}</span> </div> <div style="display:flex;justify-content:space-between;align-items:center"> <span style="font-size:0.75rem;color:#94a3b8">by ${p.postedBy?.name || 'Unknown'} • ${timeSince(p.createdAt)}</span> <span style="font-size:0.75rem;color:#64748b"> ${p.comments?.length || 0}</span> </div> </div> </div> `).join(''); } function openDetail(id) { const p = posts.find(x => x._id === id); if (!p) return; const isOwner = p.postedBy?._id === user._id || p.postedBy === user._id; const comments = (p.comments || []).map(c => ` <div class="comment"> <div class="comment-avatar">${getInitials(c.user?.name || 'U')}</div> <div class="comment-body"> <p class="author">${c.user?.name || 'Unknown'}</p> <p class="text">${c.text}</p> <p class="time">${timeSince(c.createdAt)}</p> </div> </div> `).join(''); document.getElementById('detail-content').innerHTML = ` ${p.photo ? `<img src="${p.photo}" style="width:100%;max-height:220px;object-fit:cover;border-radius:8px;margin-bottom:16px" onerror="this.style.display='none'"/>` : ''} <h3 style="margin-bottom:12px">${p.description}</h3> <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px;font-size:0.88rem"> <div> <strong>Found at:</strong> ${p.foundAt}</div> <div> <strong>Collect from:</strong> ${p.collectFrom}</div> <div> <strong>Contact:</strong> ${p.phone}</div> <div> <strong>Posted by:</strong> ${p.postedBy?.name || 'Unknown'} • ${timeSince(p.createdAt)}</div> </div> <div id="detail-alert"></div> ${isOwner || user.role === 'admin' ? ` <button onclick="resolvePost('${id}')" class="btn btn-success btn-sm" style="margin-bottom:16px"> Mark as Returned (will delete in 24h) </button> <button onclick="deletePost('${id}')" class="btn btn-danger btn-sm" style="margin-bottom:16px;margin-left:8px"> Delete </button> ` : ''} <h4 style="margin-bottom:10px">Comments</h4> <div>${comments || '<p style="color:#94a3b8;font-size:0.85rem">No comments yet</p>'}</div> <div style="display:flex;gap:8px;margin-top:12px"> <input type="text" id="lf-comment-in" placeholder="Write a comment..." style="flex:1;padding:8px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.88rem"/> <button class="btn btn-primary btn-sm" onclick="addLFComment('${id}')">Post</button> </div> `; document.getElementById('detail-modal').classList.add('show'); } async function resolvePost(id) { try { const res = await apiFetch(`/lostfound/${id}/resolve`, { method: 'PUT' }); showAlert('detail-alert', res.message, 'success'); await loadPosts(); } catch(e) { showAlert('detail-alert', e.message, 'danger'); } } async function deletePost(id) { if (!confirm('Delete this post?')) return; try { await apiFetch(`/lostfound/${id}`, { method: 'DELETE' }); document.getElementById('detail-modal').classList.remove('show'); await loadPosts(); } catch(e) { alert(e.message); } } async function addLFComment(id) { const input = document.getElementById('lf-comment-in'); const text = input.value.trim(); if (!text) return; try { await apiFetch(`/lostfound/${id}/comment`, { method: 'POST', body: JSON.stringify({ text }) }); input.value = ''; await loadPosts(); openDetail(id); } catch(e) { alert(e.message); } } document.getElementById('post-btn').addEventListener('click', () => { document.getElementById('post-modal').classList.add('show'); }); document.getElementById('close-post').addEventListener('click', () => { document.getElementById('post-modal').classList.remove('show'); }); document.getElementById('close-detail').addEventListener('click', () => { document.getElementById('detail-modal').classList.remove('show'); }); document.getElementById('post-form').addEventListener('submit', async (e) => { e.preventDefault(); const btn = document.getElementById('post-submit'); btn.disabled = true; btn.textContent = 'Posting...'; const fd = new FormData(); fd.append('description', document.getElementById('lf-desc').value); fd.append('foundAt', document.getElementById('lf-found').value); fd.append('collectFrom', document.getElementById('lf-collect').value); fd.append('phone', document.getElementById('lf-phone').value); const photo = document.getElementById('lf-photo').files[0]; if (photo) fd.append('photo', photo); try { await apiFetch('/lostfound', { method: 'POST', body: fd, headers: {} }); showAlert('post-alert', 'Post created!', 'success'); document.getElementById('post-form').reset(); await loadPosts(); } catch(e) { showAlert('post-alert', e.message, 'danger'); } btn.disabled = false; btn.textContent = 'Post Item'; }); loadPosts();
</script>
</body>
</html>
