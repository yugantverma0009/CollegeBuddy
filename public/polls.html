<!DOCTYPE html>
<html lang="en">
<head> <meta charset="UTF-8"/> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>Bunk Polls - College Buddy</title> <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="topbar"> <button id="menu-toggle">☰</button> <h2>Bunk Polls</h2>
</div> <div class="app-layout"> <div id="sidebar-container"></div> <main class="main-content"> <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px"> <div> <h1> Super Poll - Bunk System</h1> <p>CR creates polls. When 35/70 students vote yes, a teacher notification is auto-sent.</p> </div> <button class="btn btn-primary" id="create-poll-btn" style="display:none">+ Create Poll</button> </div> <div class="filter-bar"> <select id="p-dept"> <option value="">All Depts</option> <option value="CSE">CSE</option> <option value="ME">ME</option> <option value="ECE">ECE</option> <option value="Civil">Civil</option> <option value="EE">EE</option> </select> <select id="p-year"> <option value="">All Years</option> <option value="1Y">1Y</option> <option value="2Y">2Y</option> <option value="3Y">3Y</option> <option value="4Y">4Y</option> </select> <button class="btn btn-secondary" id="filter-polls">Filter</button> </div> <div id="alert-box"></div> <div id="polls-container"> <div class="card"> <div class="skeleton-line"></div> <div class="skeleton-line"></div> <div class="skeleton-line"></div> </div> </div> </main>
</div> <!-- Create Poll Modal (CR only) -->
<div class="modal-overlay" id="create-modal"> <div class="modal"> <button class="modal-close" id="close-create">✕</button> <h3> Create Bunk Poll</h3> <div id="create-alert"></div> <form id="create-form"> <div class="form-group"> <label>Poll Title *</label> <input type="text" id="p-title" placeholder="e.g. Skip Monday's Physics class?" required/> </div> <div class="form-group"> <label>Description</label> <textarea id="p-desc" rows="2" placeholder="Why do you want to bunk?"></textarea> </div> <div class="form-group"> <label>Your note to teacher (included in teacher notification)</label> <textarea id="p-crdesc" rows="2" placeholder="Add context for the teacher..."></textarea> </div> <div class="form-row"> <div class="form-group"> <label>Department</label> <select id="p-dept-create"> <option value="CSE">CSE</option> <option value="ME">ME</option> <option value="ECE">ECE</option> <option value="Civil">Civil</option> <option value="EE">EE</option> </select> </div> <div class="form-group"> <label>Year</label> <select id="p-year-create"> <option value="1Y">1Y</option> <option value="2Y">2Y</option> <option value="3Y">3Y</option> <option value="4Y">4Y</option> </select> </div> </div> <div class="form-row"> <div class="form-group"> <label>Vote Threshold</label> <input type="number" id="p-threshold" value="35" min="1"/> </div> <div class="form-group"> <label>Total Students</label> <input type="number" id="p-total" value="70" min="1"/> </div> </div> <div class="form-group"> <label>Teacher (optional)</label> <select id="p-teacher"> <option value="">Select teacher</option> </select> </div> <button type="submit" class="btn btn-primary btn-full">Create Poll</button> </form> </div>
</div> <!-- Poll Detail Modal -->
<div class="modal-overlay" id="detail-modal"> <div class="modal" style="max-width:580px"> <button class="modal-close" id="close-detail">✕</button> <div id="detail-content"></div> </div>
</div> <script src="/js/config.js"></script>
  <script src="/js/app.js"></script>
<script src="/js/sidebar.js"></script>
<script> if (!requireAuth()) throw new Error(); renderSidebar(); const user = getUser(); let polls = []; document.getElementById('p-dept').value = user.department || ''; document.getElementById('p-year').value = user.year || ''; persistFilterState('cb_polls_filters', ['p-dept', 'p-year']); if (['cr','admin'].includes(user.role)) { document.getElementById('create-poll-btn').style.display = 'inline-flex'; } /* pre-fill dept/year for CR */ if (document.getElementById('p-dept-create')) { document.getElementById('p-dept-create').value = user.department || 'CSE'; document.getElementById('p-year-create').value = user.year || '1Y'; } async function loadPolls(dept='', year='') { let url = '/polls?'; if (dept) url += `department=${dept}&`; if (year) url += `year=${year}&`; try { polls = await apiFetch(url); renderPolls(); } catch(e) { document.getElementById('polls-container').innerHTML = `<div class="empty-state"><div class="empty-mark"></div><p>${e.message}</p><p class="muted-link">Check server/API and retry.</p></div>`; } } function renderPolls() { if (!polls.length) { document.getElementById('polls-container').innerHTML = `<div class="empty-state"><div class="empty-mark"></div><p>No polls yet. ${['cr','admin'].includes(user.role) ? 'Create one above!' : 'Ask your CR to create a poll.'}</p></div>`; return; } document.getElementById('polls-container').innerHTML = polls.map(p => { const yes = p.votes.filter(v => v.vote === 'yes').length; const no = p.votes.filter(v => v.vote === 'no').length; const pct = Math.min(100, Math.round((yes / p.threshold) * 100)); const alreadyVoted = p.votes.some(v => v.user?._id === user._id || v.user === user._id); const reached = yes >= p.threshold; return `<div class="poll-card" style="margin-bottom:14px"> <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px"> <div> <h4 style="font-size:0.95rem;margin-bottom:4px">${p.title}</h4> <p style="font-size:0.78rem;color:#64748b">${p.department} ${p.year} • by ${p.createdBy?.name || 'CR'}</p> </div> <span class="badge ${p.status === 'active' ? 'badge-success' : 'badge-warning'}">${p.status}</span> </div> ${p.description ? `<p style="font-size:0.85rem;color:#475569;margin-bottom:10px">${p.description}</p>` : ''} <div style="margin-bottom:8px"> <div style="display:flex;justify-content:space-between;font-size:0.8rem;margin-bottom:4px"> <span>${yes} yes votes</span> <span>Need ${p.threshold} to send to teacher</span> </div> <div class="poll-progress"> <div class="poll-progress-fill ${reached ? 'reached' : ''}" style="width:${pct}%"></div> </div> <div style="display:flex;justify-content:space-between;font-size:0.75rem;color:#94a3b8;margin-top:4px"> <span>${yes} yes / ${no} no (${p.votes.length} total)</span> <span>${pct}% of threshold</span> </div> </div> ${reached ? `<div class="alert alert-success" style="margin-bottom:8px;font-size:0.82rem"> Threshold reached! Message sent to teacher.</div>` : ''} <div style="display:flex;gap:8px;flex-wrap:wrap"> ${p.status === 'active' && !alreadyVoted && user.role === 'student' ? ` <button onclick="vote('${p._id}','yes')" class="btn btn-success btn-sm"> Yes, Bunk!</button> <button onclick="vote('${p._id}','no')" class="btn btn-danger btn-sm"> No, Attend</button> ` : alreadyVoted ? `<span class="badge badge-info">You voted</span>` : ''} <button onclick="openPoll('${p._id}')" class="btn btn-secondary btn-sm">View Details</button> ${['cr','admin'].includes(user.role) && p.status === 'active' ? `<button onclick="closePoll('${p._id}')" class="btn btn-warning btn-sm">Close Poll</button>` : ''} </div> </div>`; }).join(''); } async function vote(id, v) { try { const res = await apiFetch(`/polls/${id}/vote`, { method: 'POST', body: JSON.stringify({ vote: v }) }); if (res.thresholdReached) { showAlert('alert-box', ' Threshold reached! A teacher notification has been generated.', 'success'); } await loadPolls(document.getElementById('p-dept').value, document.getElementById('p-year').value); } catch(e) { showAlert('alert-box', e.message, 'danger'); } } async function closePoll(id) { if (!confirm('Close this poll?')) return; try { await apiFetch(`/polls/${id}/close`, { method: 'PUT' }); await loadPolls(document.getElementById('p-dept').value, document.getElementById('p-year').value); } catch(e) { alert(e.message); } } async function openPoll(id) { try { const p = await apiFetch(`/polls/${id}`); const yes = p.votes.filter(v => v.vote === 'yes').length; const no = p.votes.filter(v => v.vote === 'no').length; const pct = Math.min(100, Math.round((yes / p.threshold) * 100)); document.getElementById('detail-content').innerHTML = ` <h3 style="margin-bottom:8px">${p.title}</h3> <div style="font-size:0.82rem;color:#64748b;margin-bottom:16px"> ${p.department} ${p.year} • Created by ${p.createdBy?.name || 'CR'} • ${formatDate(p.createdAt)} ${p.teacher ? ` • Teacher: ${p.teacher.name}` : ''} </div> ${p.description ? `<p style="margin-bottom:12px;font-size:0.88rem">${p.description}</p>` : ''} <div class="card" style="margin-bottom:16px"> <h4 style="font-size:0.88rem;margin-bottom:8px">Vote Progress</h4> <div class="poll-progress" style="margin-bottom:6px"> <div class="poll-progress-fill ${yes >= p.threshold ? 'reached' : ''}" style="width:${pct}%"></div> </div> <div style="display:flex;justify-content:space-between;font-size:0.82rem"> <span> Yes: <strong>${yes}</strong></span> <span> No: <strong>${no}</strong></span> <span>Threshold: <strong>${p.threshold}/${p.totalStudents}</strong></span> </div> </div> ${p.crDescription ? ` <div class="alert alert-info" style="margin-bottom:16px"> <strong>CR Note:</strong> ${p.crDescription} </div> ` : ''} ${p.sentToTeacher && p.teacherMessage ? ` <div class="card" style="border-left:4px solid #16a34a;background:#f0fdf4;margin-bottom:16px"> <h4 style="font-size:0.88rem;margin-bottom:8px;color:#166534"> Teacher Notification</h4> <pre style="white-space:pre-wrap;font-family:inherit;font-size:0.82rem;color:#1e293b;line-height:1.6">${p.teacherMessage}</pre> </div> ` : ''} `; document.getElementById('detail-modal').classList.add('show'); } catch(e) { alert(e.message); } } document.getElementById('create-poll-btn').addEventListener('click', async () => { /* load teachers */ try { const teachers = await apiFetch('/users?role=teacher'); const sel = document.getElementById('p-teacher'); sel.innerHTML = '<option value="">No specific teacher</option>'; teachers.forEach(t => { sel.innerHTML += `<option value="${t._id}">${t.name} (${t.department})</option>`; }); } catch(e) {} document.getElementById('create-modal').classList.add('show'); }); document.getElementById('close-create').addEventListener('click', () => document.getElementById('create-modal').classList.remove('show')); document.getElementById('close-detail').addEventListener('click', () => document.getElementById('detail-modal').classList.remove('show')); document.getElementById('filter-polls').addEventListener('click', () => { loadPolls(document.getElementById('p-dept').value, document.getElementById('p-year').value); }); document.getElementById('create-form').addEventListener('submit', async (e) => { e.preventDefault(); try { await apiFetch('/polls', { method: 'POST', body: JSON.stringify({ title: document.getElementById('p-title').value, description: document.getElementById('p-desc').value, crDescription: document.getElementById('p-crdesc').value, department: document.getElementById('p-dept-create').value, year: document.getElementById('p-year-create').value, teacher: document.getElementById('p-teacher').value || undefined, threshold: parseInt(document.getElementById('p-threshold').value), totalStudents: parseInt(document.getElementById('p-total').value) }) }); showAlert('create-alert', 'Poll created!', 'success'); document.getElementById('create-form').reset(); await loadPolls(); } catch(e) { showAlert('create-alert', e.message, 'danger'); } }); loadPolls(document.getElementById('p-dept').value, document.getElementById('p-year').value);
</script>
</body>
</html>
