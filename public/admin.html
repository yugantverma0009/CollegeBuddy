<!DOCTYPE html>
<html lang="en">
<head> <meta charset="UTF-8"/> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>Admin Panel - College Buddy</title> <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="topbar"> <button id="menu-toggle">☰</button> <h2>Admin Panel</h2>
</div> <div class="app-layout"> <div id="sidebar-container"></div> <main class="main-content"> <div class="page-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px"> <div> <h1> Admin Panel</h1> <p>Manage users, create teacher and CR accounts</p> </div> <button class="btn btn-primary" id="create-user-btn">+ Create Teacher/CR</button> </div> <div id="alert-box"></div> <!-- Stats row --> <div class="grid-4" style="margin-bottom:24px" id="admin-stats"> <div class="stat-card"><div class="stat-icon" aria-hidden="true">👥</div><div class="stat-value" id="s-total">-</div><div class="stat-label">Total Users</div></div> <div class="stat-card"><div class="stat-icon" aria-hidden="true">🎓</div><div class="stat-value" id="s-students">-</div><div class="stat-label">Students</div></div> <div class="stat-card"><div class="stat-icon" aria-hidden="true">🧑‍🏫</div><div class="stat-value" id="s-teachers">-</div><div class="stat-label">Teachers</div></div> <div class="stat-card"><div class="stat-icon" aria-hidden="true">🗂️</div><div class="stat-value" id="s-cr">-</div><div class="stat-label">CRs</div></div> </div> <div class="card"> <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px"> <h3>All Users</h3> <div style="display:flex;gap:8px;flex-wrap:wrap"> <select id="a-role-filter"> <option value="">All Roles</option> <option value="student">Students</option> <option value="teacher">Teachers</option> <option value="cr">CRs</option> <option value="admin">Admins</option> </select> <select id="a-dept-filter"> <option value="">All Depts</option> <option value="CSE">CSE</option> <option value="ME">ME</option> <option value="ECE">ECE</option> <option value="Civil">Civil</option> <option value="EE">EE</option> </select> <button class="btn btn-secondary btn-sm" id="filter-users-btn">Filter</button> </div> </div> <div class="table-wrap"> <table id="users-table"> <thead> <tr> <th>Name</th> <th>Email</th> <th>Role</th> <th>Dept</th> <th>Year</th> <th>Points</th> <th>Actions</th> </tr> </thead> <tbody id="users-tbody"> <tr><td colspan="7" style="text-align:center;color:#94a3b8">Loading...</td></tr> </tbody> </table> </div> </div> </main>
</div> <!-- Create User Modal -->
<div class="modal-overlay" id="create-modal"> <div class="modal"> <button class="modal-close" id="close-create">✕</button> <h3> Create Teacher / CR Account</h3> <p style="font-size:0.82rem;color:#64748b;margin-bottom:16px">Only admins can create teacher and CR accounts.</p> <div id="create-alert"></div> <form id="create-form"> <div class="form-row"> <div class="form-group"> <label>Name *</label> <input type="text" id="c-name" required/> </div> <div class="form-group"> <label>Email *</label> <input type="email" id="c-email" required/> </div> </div> <div class="form-row"> <div class="form-group"> <label>Password *</label> <input type="password" id="c-password" required/> </div> <div class="form-group"> <label>Role *</label> <select id="c-role" required> <option value="teacher">Teacher</option> <option value="cr">CR (Class Representative)</option> <option value="admin">Admin</option> </select> </div> </div> <div class="form-row"> <div class="form-group"> <label>Department</label> <select id="c-dept"> <option value="CSE">CSE</option> <option value="ME">ME</option> <option value="ECE">ECE</option> <option value="Civil">Civil</option> <option value="EE">EE</option> </select> </div> <div class="form-group"> <label>Year (for CRs)</label> <select id="c-year"> <option value="">N/A</option> <option value="1Y">1Y</option> <option value="2Y">2Y</option> <option value="3Y">3Y</option> <option value="4Y">4Y</option> </select> </div> </div> <div class="form-group"> <label>Phone</label> <input type="text" id="c-phone"/> </div> <button type="submit" class="btn btn-primary btn-full">Create Account</button> </form> </div>
</div> <!-- Edit User Modal -->
<div class="modal-overlay" id="edit-modal"> <div class="modal"> <button class="modal-close" id="close-edit">✕</button> <h3> Edit User</h3> <div id="edit-alert"></div> <input type="hidden" id="edit-id"/> <div class="form-group"> <label>Role</label> <select id="e-role"> <option value="student">Student</option> <option value="teacher">Teacher</option> <option value="cr">CR</option> <option value="admin">Admin</option> </select> </div> <div class="form-row"> <div class="form-group"> <label>Department</label> <select id="e-dept"> <option value="CSE">CSE</option> <option value="ME">ME</option> <option value="ECE">ECE</option> <option value="Civil">Civil</option> <option value="EE">EE</option> </select> </div> <div class="form-group"> <label>Year</label> <select id="e-year"> <option value="">N/A</option> <option value="1Y">1Y</option> <option value="2Y">2Y</option> <option value="3Y">3Y</option> <option value="4Y">4Y</option> </select> </div> </div> <div class="form-group"> <label>Points</label> <input type="number" id="e-points" min="0"/> </div> <button class="btn btn-primary btn-full" id="save-edit">Save Changes</button> </div>
</div> <script src="/js/config.js"></script>
  <script src="/js/app.js"></script>
<script src="/js/sidebar.js"></script>
<script> if (!requireAuth()) throw new Error(); renderSidebar(); const user = getUser(); if (user.role !== 'admin') { document.querySelector('.main-content').innerHTML = ` <div class="empty-state" style="margin-top:80px"> <div class="empty-mark"></div> <p>Admin access required</p> <a href="/dashboard.html" class="btn btn-primary" style="margin-top:16px">Go to Dashboard</a> </div>`; } let allUsers = []; async function loadUsers(role='', dept='') { let url = '/users?'; if (role) url += `role=${role}&`; if (dept) url += `department=${dept}&`; try { allUsers = await apiFetch(url); updateStats(allUsers); renderTable(allUsers); } catch(e) { showAlert('alert-box', e.message, 'danger'); } } function updateStats(users) { document.getElementById('s-total').textContent = users.length; document.getElementById('s-students').textContent = users.filter(u => u.role === 'student').length; document.getElementById('s-teachers').textContent = users.filter(u => u.role === 'teacher').length; document.getElementById('s-cr').textContent = users.filter(u => u.role === 'cr').length; } function renderTable(users) { if (!users.length) { document.getElementById('users-tbody').innerHTML = '<tr><td colspan="7" style="text-align:center;color:#94a3b8">No users found</td></tr>'; return; } document.getElementById('users-tbody').innerHTML = users.map(u => ` <tr> <td><strong>${u.name}</strong></td> <td style="font-size:0.82rem;color:#64748b">${u.email}</td> <td>${roleBadge(u.role)}</td> <td>${u.department || '-'}</td> <td>${u.year || '-'}</td> <td> ${u.points || 0}</td> <td> <div style="display:flex;gap:6px"> <button onclick="editUser('${u._id}')" class="btn btn-secondary btn-sm">Edit</button> <button onclick="deleteUser('${u._id}','${u.name}')" class="btn btn-danger btn-sm">Del</button> </div> </td> </tr> `).join(''); } function editUser(id) { const u = allUsers.find(x => x._id === id); if (!u) return; document.getElementById('edit-id').value = id; document.getElementById('e-role').value = u.role; document.getElementById('e-dept').value = u.department || 'CSE'; document.getElementById('e-year').value = u.year || ''; document.getElementById('e-points').value = u.points || 0; document.getElementById('edit-modal').classList.add('show'); } async function deleteUser(id, name) { if (!confirm(`Delete user "${name}"? This cannot be undone.`)) return; try { await apiFetch(`/users/${id}`, { method: 'DELETE' }); showAlert('alert-box', `User ${name} deleted`, 'success'); await loadUsers(); } catch(e) { showAlert('alert-box', e.message, 'danger'); } } document.getElementById('save-edit').addEventListener('click', async () => { const id = document.getElementById('edit-id').value; try { await apiFetch(`/users/${id}`, { method: 'PUT', body: JSON.stringify({ role: document.getElementById('e-role').value, department: document.getElementById('e-dept').value, year: document.getElementById('e-year').value, points: parseInt(document.getElementById('e-points').value) }) }); showAlert('edit-alert', 'User updated!', 'success'); await loadUsers(); } catch(e) { showAlert('edit-alert', e.message, 'danger'); } }); document.getElementById('create-user-btn').addEventListener('click', () => document.getElementById('create-modal').classList.add('show')); document.getElementById('close-create').addEventListener('click', () => document.getElementById('create-modal').classList.remove('show')); document.getElementById('close-edit').addEventListener('click', () => document.getElementById('edit-modal').classList.remove('show')); document.getElementById('filter-users-btn').addEventListener('click', () => { loadUsers(document.getElementById('a-role-filter').value, document.getElementById('a-dept-filter').value); }); document.getElementById('create-form').addEventListener('submit', async (e) => { e.preventDefault(); try { await apiFetch('/auth/create-user', { method: 'POST', body: JSON.stringify({ name: document.getElementById('c-name').value, email: document.getElementById('c-email').value, password: document.getElementById('c-password').value, role: document.getElementById('c-role').value, department: document.getElementById('c-dept').value, year: document.getElementById('c-year').value || undefined, phone: document.getElementById('c-phone').value }) }); showAlert('create-alert', 'Account created successfully!', 'success'); document.getElementById('create-form').reset(); await loadUsers(); } catch(e) { showAlert('create-alert', e.message, 'danger'); } }); if (user.role === 'admin') loadUsers();
</script>
</body>
</html>
