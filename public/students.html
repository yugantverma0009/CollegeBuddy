<!DOCTYPE html>
<html lang="en">
<head> <meta charset="UTF-8"/> <meta name="viewport" content="width=device-width, initial-scale=1.0"/> <title>Student Directory - College Buddy</title> <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="topbar"> <button id="menu-toggle">☰</button> <h2>Student Directory</h2>
</div> <div class="app-layout"> <div id="sidebar-container"></div> <main class="main-content"> <div class="page-header"> <h1> Student Directory</h1> <p>Search and find classmates and faculty by name, department or year</p> </div> <div class="filter-bar"> <input type="text" id="search-user" placeholder="Search by name..."/> <select id="f-dept"> <option value="">All Departments</option> <option value="CSE">CSE</option> <option value="ME">ME</option> <option value="ECE">ECE</option> <option value="Civil">Civil</option> <option value="EE">EE</option> </select> <select id="f-year"> <option value="">All Years</option> <option value="1Y">1st Year</option> <option value="2Y">2nd Year</option> <option value="3Y">3rd Year</option> <option value="4Y">4th Year</option> </select> <select id="f-role"> <option value="">All Roles</option> <option value="student">Students</option> <option value="teacher">Teachers</option> <option value="cr">CR</option> </select> <button class="btn btn-secondary" id="filter-btn">Filter</button> </div> <div id="alert-box"></div> <div id="user-list"> <div class="empty-state"> <div class="empty-mark"></div> <p>Loading users...</p> </div> </div> </main>
</div> <!-- User Detail Modal -->
<div class="modal-overlay" id="user-modal"> <div class="modal"> <button class="modal-close" id="close-user">✕</button> <div id="user-detail"></div> </div>
</div> <script src="/js/app.js"></script>
<script src="/js/sidebar.js"></script>
<script> if (!requireAuth()) throw new Error(); renderSidebar(); const user = getUser(); let allUsers = []; document.getElementById('f-dept').value = user.department || ''; persistFilterState('cb_students_filters', ['search-user', 'f-dept', 'f-year', 'f-role']); async function loadUsers(dept='', year='', role='') { let url = '/users?'; if (dept) url += `department=${dept}&`; if (year) url += `year=${year}&`; if (role) url += `role=${role}&`; try { allUsers = await apiFetch(url); renderUsers(); } catch(e) { document.getElementById('user-list').innerHTML = `<div class="empty-state"><div class="empty-mark"></div><p>${e.message}</p><p class="muted-link">Please verify backend server is running.</p></div>`; } } function renderUsers(q='') { let data = allUsers; if (q) data = data.filter(u => u.name.toLowerCase().includes(q.toLowerCase()) || (u.rollNo||'').toLowerCase().includes(q.toLowerCase())); if (!data.length) { document.getElementById('user-list').innerHTML = `<div class="empty-state"><div class="empty-mark"></div><p>No users found</p></div>`; return; } const roleColors = { admin: '#92400e', teacher: '#1e40af', cr: '#6b21a8', student: '#166534' }; /* group by dept+year for better readability */ const groups = {}; data.forEach(u => { const key = `${u.department} ${u.year || ''}`.trim(); if (!groups[key]) groups[key] = []; groups[key].push(u); }); let html = ''; Object.keys(groups).sort().forEach(key => { html += `<div class="dir-group"> <h3 class="dir-group-title">${key || 'Other'}</h3> <div class="grid-3">`; groups[key].forEach(u => { html += `<div onclick="openUser('${u._id}')" class="dir-card"> <div class="dir-avatar" style="background:${roleColors[u.role]||'#1e293b'}"> ${getInitials(u.name)} </div> <div style="min-width:0"> <p class="dir-name">${u.name}</p> <p class="dir-sub">${u.rollNo || u.email}</p> <span class="badge badge-${u.role}" style="margin-top:2px">${u.role}</span> </div> </div>`; }); html += `</div></div>`; }); document.getElementById('user-list').innerHTML = html; } async function openUser(id) { try { const u = await apiFetch(`/users/${id}`); document.getElementById('user-detail').innerHTML = ` <div style="display:flex;align-items:center;gap:16px;margin-bottom:20px"> <div style="width:64px;height:64px;border-radius:50%;background:#2563eb;color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.4rem;flex-shrink:0"> ${getInitials(u.name)} </div> <div> <h3 style="font-size:1.1rem">${u.name}</h3> <p style="color:#64748b;font-size:0.85rem">${u.email}</p> ${roleBadge(u.role)} </div> </div> <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:0.88rem"> ${u.rollNo ? `<div><strong>Roll No:</strong> ${u.rollNo}</div>` : ''} ${u.department ? `<div><strong>Department:</strong> ${u.department}</div>` : ''} ${u.year ? `<div><strong>Year:</strong> ${u.year}</div>` : ''} ${u.phone ? `<div><strong>Phone:</strong> <a href="tel:${u.phone}">${u.phone}</a></div>` : ''} ${u.dob ? `<div><strong>DOB:</strong> ${formatDate(u.dob)}</div>` : ''} ${u.role === 'student' ? `<div><strong>Points:</strong> ${u.points}</div>` : ''} <div><strong>Joined:</strong> ${formatDate(u.createdAt)}</div> </div> `; document.getElementById('user-modal').classList.add('show'); } catch(e) { alert(e.message); } } document.getElementById('close-user').addEventListener('click', () => document.getElementById('user-modal').classList.remove('show')); document.getElementById('filter-btn').addEventListener('click', () => { loadUsers( document.getElementById('f-dept').value, document.getElementById('f-year').value, document.getElementById('f-role').value ); }); document.getElementById('search-user').addEventListener('input', (e) => renderUsers(e.target.value)); loadUsers( document.getElementById('f-dept').value, document.getElementById('f-year').value, document.getElementById('f-role').value );
</script>
</body>
</html>
